name: PiPanel
options:
  bundleIdPrefix: com.pipanel
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "5"
    DEVELOPMENT_TEAM: GXVN75MDQN
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    MACOSX_DEPLOYMENT_TARGET: "14.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: 2.9.4

targets:
  PiPanel:
    type: application
    platform: macOS
    sources:
      - path: PiPanel
        excludes:
          - "**/Info.plist"
          - "**/*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pipanel.mac
        PRODUCT_NAME: PiPanel
        INFOPLIST_FILE: PiPanel/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: PiPanel/App/PiPanel.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_EMIT_LOC_STRINGS: NO
        SWIFT_OBJC_BRIDGING_HEADER: PiPanel/Support/CGVirtualDisplayPrivate.h
      configs:
        Debug:
          CODE_SIGN_IDENTITY: Apple Development
        Release:
          CODE_SIGN_IDENTITY: Developer ID Application
    dependencies:
      - sdk: AVKit.framework
      - package: Sparkle

  PiPanelTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: PiPanelTests
    dependencies:
      - target: PiPanel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pipanel.mac.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  PiPanel:
    build:
      targets:
        PiPanel: all
        PiPanelTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PiPanelTests
