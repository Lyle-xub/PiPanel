name: Update Star History

on:
  push:
    branches: [main]
    paths:
      - .github/scripts/update_star_history.py
      - .github/workflows/update-star-history.yml
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-star-history
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Generate star history chart
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/update_star_history.py

      - name: Commit updated chart
        run: |
          git add docs/assets/star-history.json docs/assets/star-history.svg
          if git diff --cached --quiet; then
            echo "Star history is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update star history chart"
          git push
